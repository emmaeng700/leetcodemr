<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — LeetMastery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 56px; height: 56px;
      background: #eef2ff;
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem;
    }
    h1 { font-size: 1.2rem; font-weight: 700; color: #111827; margin-bottom: 0.5rem; }
    p  { font-size: 0.875rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #4f46e5; color: white;
      border: none; border-radius: 0.75rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; width: 100%;
      transition: background 0.15s;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>This page needs an internet connection. Check your connection and try again — all question pages, flashcards, and images work offline once cached.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
